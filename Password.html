<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User password manager</title>
    <style>
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-save {
            background: #667eea;
            color: white;
        }
        .btn-clear {
            background: #ff6b6b;
            color: white;
        }
        .display-section {
            background: #e8f5e9;
            padding: 20px;
            border-radius: 10px;
        }
        .info-item {
            background: white;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>XiaoLiu's Password Manager</h1>
        
        <div class="form-section">
            <div class="form-group">
                <label for="username">User name：</label>
                <input type="text" id="username" placeholder="Please input your username">
            </div>
            <div class="form-group">
                <label for="password">Password：</label>
                <input type="password" id="password" placeholder="please input your password">
            </div>
            <div class="button-group">
                <button class="btn-save" onclick="saveData()">encrypt it</button>
                <button class="btn-clear" onclick="clearData()">Clean Store Area</button>
            </div>
        </div>
        <div class="display-section">
            <h2>Data in the cache</h2>
            <div id="displayArea"></div>
        </div>
    </div>

    <script>
    const enc = new TextEncoder();
    function toBase64(buf) {
      return btoa(String.fromCharCode(...new Uint8Array(buf)));
    }
    function fromBase64(b64) {
      const bin = atob(b64);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    }
    const PBKDF2_ITER = 200_000;
    const KEY_LEN_BITS = 256;
    const HASH = "SHA-256";
    async function hashPasswordPBKDF2(password) {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const baseKey = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveBits"]
      );
      const derivedBits = await crypto.subtle.deriveBits(
        { name: "PBKDF2", salt, iterations: PBKDF2_ITER, hash: HASH },
        baseKey,
        KEY_LEN_BITS
      );
      const record = [
        "pbkdf2",
        PBKDF2_ITER,
        toBase64(salt.buffer),
        toBase64(derivedBits),
      ].join("$");
      return record;
    }
    window.onload = displayData;
    async function saveData() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      if (!username || !password) {
        alert("Username & password are required.");
        return;
      }
      const hashedRecord = await hashPasswordPBKDF2(password);
      const userData = {
        username,
        password_record: hashedRecord,
        timestamp: new Date().toLocaleString("en-GB")
      };

      localStorage.setItem("userData", JSON.stringify(userData));
      document.getElementById("username").value = "";
      document.getElementById("password").value = "";
      displayData();
      alert("Password stored successfully.");
    }
    function displayData() {
      const displayArea = document.getElementById("displayArea");
      const userData = localStorage.getItem("userData");
      if (userData) {
        const data = JSON.parse(userData);
        displayArea.innerHTML = `
          <div class="info-item">
            <div class="info-label"><strong>Username：</strong></div>
            <div class="info-value">${data.username}</div>
          </div>
          <div class="info-item">
            <div class="info-label"><strong>Password Record：</strong></div>
            <div class="info-value">${data.password_record}</div>
          </div>
          <div class="info-item">
            <div class="info-label"><strong>Save time：</strong></div>
            <div class="info-value">${data.timestamp}</div>
          </div>
        `;
      } else {
        displayArea.innerHTML = '<div class="empty-state">No stored password record.</div>';
      }
    }
    function clearData() {
      if (confirm("Are you sure to delete stored data?")) {
        localStorage.removeItem("userData");
        displayData();
        alert("Cleaned successfully.");
      }
    }
  </script>
</body>
</html>
